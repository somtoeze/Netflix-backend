name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Maven dependencies (faster builds)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # 4. Build with Maven
      - name: Build project
        run: mvn clean package -DskipTests

      # 5. Build Docker image
      - name: Build Docker image
        run: docker build -t netflix-backend .

      # 6. (Optional) Login to Docker Hub
      - name: Login to Docker Hub
        if: success()
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. (Optional) Push Docker image
      - name: Push Docker image
        if: success()
        run: |
          docker tag netflix-backend ${{ secrets.DOCKER_USERNAME }}/netflix-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/netflix-backend:latest